<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АРМ «Великополье»</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f3f4f6 0%, #e5e7eb 100%);
            min-height: 100vh;
        }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .nav-active {
            background: #eef2ff;
            color: #4f46e5;
            border-right: 4px solid #4f46e5;
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            flex-shrink: 0;
        }
        .logout-btn:hover {
            background: #fee2e2;
            color: #dc2626;
            border-color: #fca5a5;
        }
        #moduleWorkspace {
            animation: fadeIn 0.4s ease-out;
        }
    </style>
</head>
<body>

    <!-- Оверлей входа -->
    <div id="siteAuthOverlay" class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 fade-in">
        <div class="bg-white rounded-3xl w-full max-w-md p-8 shadow-2xl border border-gray-100/50 text-center space-y-6">
            <div class="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-3xl border border-indigo-100 shadow-sm flex items-center justify-center text-4xl mx-auto">🔐</div>
            <div>
                <p class="text-xs font-bold text-indigo-600 uppercase tracking-wider mb-1">филиал СХК «Великополье»</p>
                <h2 class="text-2xl font-black text-gray-800">Вход в систему АРМ</h2>
                <p class="text-sm text-gray-500 mt-1 font-medium">Выберите должность и введите ПИН-код</p>
            </div>
            <div class="space-y-5 text-left">
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 tracking-wider mb-1.5">Должность</label>
                    <select id="authRoleSelect" class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 text-sm font-medium text-gray-800 focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition">
                        <option value="Директор">Директор</option>
                        <option value="Инженер по ЭМТП">Инженер по ЭМТП</option>
                        <option value="Техник">Техник</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 tracking-wider mb-1.5">ПИН-код</label>
                    <input type="password" id="sitePinInput" inputmode="numeric" pattern="[0-9]*" class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 text-center font-mono text-xl tracking-widest text-gray-900 focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition" placeholder="••••">
                </div>
                <button onclick="checkSiteAccess()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl transition shadow-md text-sm flex items-center justify-center gap-2">
                    Войти в систему
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" /></svg>
                </button>
            </div>
            <p id="authErrorMsg" class="text-xs font-semibold text-red-600 hidden">❌ Неверный ПИН-код! Попробуйте снова.</p>
        </div>
    </div>

    <!-- Мобильная шапка -->
    <header class="md:hidden bg-white/80 backdrop-blur-sm border-b border-gray-200/80 p-4 flex justify-between items-center sticky top-0 z-30 shadow-sm">
        <div class="flex items-center gap-2">
            <span class="text-2xl">🚜</span>
            <div>
                <h1 class="text-sm font-bold text-gray-800 leading-tight">СХК «Великополье»</h1>
                <p class="text-[10px] text-gray-400 font-medium">ГП «Минсктранс»</p>
            </div>
        </div>
        <button onclick="toggleMobileMenu()" class="text-gray-600 text-2xl hover:text-indigo-600 transition">☰</button>
    </header>

    <!-- Боковое меню -->
    <aside id="sidebar" class="fixed md:sticky top-0 left-0 z-40 w-64 h-screen bg-white/95 backdrop-blur-sm border-r border-gray-200/80 flex flex-col justify-between p-4 transition-transform -translate-x-full md:translate-x-0 shadow-xl md:shadow-none">
        <div>
            <div class="hidden md:flex items-center gap-3 mb-8 px-2 border-b border-gray-100/80 pb-5">
                <span class="text-3xl bg-indigo-50 p-2.5 rounded-2xl border border-indigo-100 shadow-sm flex items-center justify-center">🚜</span>
                <div class="flex flex-col justify-center">
                    <span class="text-[10px] font-bold text-indigo-600 uppercase tracking-wider leading-none mb-1 block">филиал СХК</span>
                    <h1 class="text-lg font-black text-gray-800 leading-tight tracking-tight">«Великополье»</h1>
                    <span class="text-[11px] font-medium text-gray-400 leading-none mt-1 block">ГП «Минсктранс»</span>
                </div>
            </div>
            <nav id="menuContainer" class="space-y-1"></nav>
        </div>
        <div class="space-y-4 border-t border-gray-100/80 pt-4 mt-auto">
            <div class="bg-gray-50/80 border border-gray-200/80 rounded-2xl p-3 flex items-center justify-between shadow-sm gap-3">
                <div class="flex items-center gap-3 min-w-0 flex-1">
                    <div id="userAvatar" class="user-avatar">В</div>
                    <div class="min-w-0 flex-1">
                        <p id="userBoxName" class="text-sm font-bold text-gray-800 truncate leading-tight">Загрузка...</p>
                        <p id="userBoxRole" class="text-[10px] font-semibold text-gray-500 uppercase tracking-wide mt-0.5 truncate">Загрузка...</p>
                    </div>
                </div>
                <button onclick="window.logoutSystemUser()" title="Выйти" class="logout-btn flex-shrink-0 w-8 h-8 flex items-center justify-center bg-white text-gray-500 border border-gray-300 hover:bg-red-50 hover:text-red-600 hover:border-red-300 rounded-xl transition shadow-sm text-sm">🚪</button>
            </div>
            <button id="pwaInstallBtn" onclick="installPWA()" class="hidden w-full bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs font-semibold px-3 py-2.5 rounded-2xl transition text-center shadow-sm">📱 Установить на телефон</button>
            <div class="text-[10px] text-gray-400 text-center pt-1 pb-2 font-medium">АРМ v1.0.1 • by Vol4ek</div>
        </div>
    </aside>

    <div id="menuOverlay" onclick="toggleMobileMenu()" class="fixed inset-0 bg-black/40 z-30 hidden md:hidden"></div>

    <!-- Основная область -->
    <main id="moduleWorkspace" class="flex-1 p-4 md:p-8 max-w-7xl mx-auto w-full relative z-10"></main>

    <script type="module">
        const SUPABASE_URL = "https://eaiitxfoqlkmykyqqapg.supabase.co";
        const SUPABASE_KEY = "sb_publishable_3sU4_opgqfZ5tPzk1bW5Ig_6XlX97pm";
        window._supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const APP_MODULES = [
            { id: 'dashboard', name: '🏠 Главная', file: './js/dashboard.js' },
            { id: 'orders', name: '📄 Документы', file: './js/orders.js' },
            { id: 'fleet', name: '🚜 Автопарк', file: './js/fleet.js' },
            { id: 'links', name: '🔗 Ссылки', file: './js/links.js' }
        ];

        let currentModuleId = 'dashboard';

        window.switchModule = async (moduleId) => {
            currentModuleId = moduleId;
            renderMenu();

            const workspace = document.getElementById('moduleWorkspace');
            workspace.innerHTML = '<div class="text-center text-gray-400 py-12">Загрузка модуля...</div>';

            const targetModule = APP_MODULES.find(m => m.id === moduleId);
            if (targetModule) {
                try {
                    const module = await import(`${targetModule.file}?v=${Date.now()}`);
                    workspace.innerHTML = module.template;
                    if (module.init) module.init();
                } catch (err) {
                    workspace.innerHTML = `<div class="text-red-500 p-4 bg-red-50 border rounded-xl">Ошибка загрузки: ${err.message}</div>`;
                }
            }
        };

        function renderMenu() {
            const container = document.getElementById('menuContainer');
            if (!container) return;
            container.innerHTML = APP_MODULES.map(mod => {
                const isActive = mod.id === currentModuleId;
                const activeClasses = isActive
                    ? 'nav-active bg-indigo-50/80 text-indigo-700 font-semibold'
                    : 'text-gray-600 hover:bg-gray-100/70 hover:text-gray-900';
                return `
                    <button onclick="switchModule('${mod.id}'); if(window.innerWidth < 768) toggleMobileMenu();" 
                            class="w-full text-left px-4 py-3 rounded-xl text-sm font-medium transition-all duration-200 flex items-center gap-3 ${activeClasses}">
                        <span class="text-lg flex-1">${mod.name}</span>
                        ${isActive ? '<span class="w-1.5 h-1.5 bg-indigo-600 rounded-full flex-shrink-0"></span>' : ''}
                    </button>
                `;
            }).join('');
        }

        window.toggleMobileMenu = () => {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('menuOverlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        };

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => { reg.update(); })
                    .catch(err => console.error('SW error:', err));
            });
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('pwaInstallBtn').classList.remove('hidden');
        });

        window.installPWA = async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                document.getElementById('pwaInstallBtn').classList.add('hidden');
            }
            deferredPrompt = null;
        };

        const USER_PROFILES = {
            "Директор": { name: "Рунцевич Д.С.", pin: "1111" },
            "Инженер по ЭМТП": { name: "Волчек А.А.", pin: "2174" },
            "Техник": { name: "Ладутько И.И.", pin: "1987" }
        };

        window.checkSiteAccess = () => {
            const input = document.getElementById('sitePinInput');
            const error = document.getElementById('authErrorMsg');
            const roleSelect = document.getElementById('authRoleSelect');
            if (!input || !roleSelect) return;
            const selectedRole = roleSelect.value;
            const profile = USER_PROFILES[selectedRole];
            if (profile && input.value === profile.pin) {
                localStorage.setItem('user_role', selectedRole);
                localStorage.setItem('user_name', profile.name);
                localStorage.setItem('site_access_granted', 'true');
                document.getElementById('siteAuthOverlay').classList.add('hidden');
                updateSidebarUser();
            } else {
                if (error) error.classList.remove('hidden');
                if (input) { input.value = ''; input.focus(); }
            }
        };

        function updateSidebarUser() {
            const role = localStorage.getItem('user_role') || 'Сотрудник';
            const name = localStorage.getItem('user_name') || 'Неизвестный';
            document.getElementById('userBoxRole').innerText = role;
            document.getElementById('userBoxName').innerText = name;
            const avatar = document.getElementById('userAvatar');
            if (avatar) {
                const initials = name.split(' ').map(w => w[0]).join('').slice(0, 2);
                avatar.textContent = initials || '?';
            }
        }

        window.logoutSystemUser = () => {
            if (confirm("Выйти из учётной записи?")) {
                localStorage.removeItem('site_access_granted');
                localStorage.removeItem('user_role');
                localStorage.removeItem('user_name');
                verifySession();
            }
        };

        function verifySession() {
            const overlay = document.getElementById('siteAuthOverlay');
            if (localStorage.getItem('site_access_granted') === 'true') {
                if (overlay) overlay.classList.add('hidden');
                updateSidebarUser();
            } else {
                if (overlay) overlay.classList.remove('hidden');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            verifySession();
            switchModule('dashboard');
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АРМ «Великополье»</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f3f4f6 0%, #e5e7eb 100%);
            height: 100vh;
            overflow: hidden;
        }
        #app {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }
        /* Боковое меню */
        #sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            width: 280px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(8px);
            border-right: 1px solid rgba(0,0,0,0.05);
            box-shadow: 4px 0 20px rgba(0,0,0,0.05);
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px 16px;
            overflow-y: auto;
        }
        #sidebar.open {
            transform: translateX(0);
        }
        #sidebarOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #sidebarOverlay.active {
            opacity: 1;
            pointer-events: all;
        }
        /* Основная область */
        #main {
            flex: 1;
            height: 100vh;
            overflow-y: auto;
            padding: 16px;
            padding-top: 80px;
            background: transparent;
        }
        @media (min-width: 768px) {
            #main {
                padding: 32px;
                padding-top: 90px;
            }
        }
        /* Кнопка меню */
        #menuToggle {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1001;
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 14px;
            padding: 10px 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: 500;
            color: #1f2937;
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        #menuToggle.hidden-btn {
            opacity: 0 !important;
            transform: translateY(-20px) !important;
            pointer-events: none !important;
        }
        #menuToggle:hover {
            background: rgba(255,255,255,0.85);
            box-shadow: 0 6px 24px rgba(0,0,0,0.1);
        }
        #menuToggle span.text {
            font-size: 14px;
        }
        @media (min-width: 768px) {
            #menuToggle {
                top: 24px;
                left: 24px;
                padding: 12px 20px;
            }
        }
        /* Навигация в меню */
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            color: #4b5563;
            transition: all 0.15s;
            cursor: pointer;
            width: 100%;
            border: none;
            background: transparent;
        }
        .nav-item:hover {
            background: #f3f4f6;
            color: #1f2937;
        }
        .nav-item.active {
            background: #eef2ff;
            color: #4f46e5;
            font-weight: 600;
            border-right: 3px solid #4f46e5;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            text-transform: uppercase;
            flex-shrink: 0;
        }
        #main::-webkit-scrollbar { width: 6px; }
        #main::-webkit-scrollbar-track { background: transparent; }
        #main::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        #main::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
        .module-enter {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Стили для оверлея аутентификации */
        .auth-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .auth-card {
            background: white;
            border-radius: 32px;
            max-width: 440px;
            width: 100%;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            text-align: center;
        }
        .auth-card .icon {
            width: 72px;
            height: 72px;
            background: #eef2ff;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 16px;
        }
        .auth-card h2 {
            font-size: 24px;
            font-weight: 800;
            color: #1f2937;
            margin-bottom: 4px;
        }
        .auth-card p.sub {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .auth-card input, .auth-card select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            font-size: 14px;
            background: #f9fafb;
            transition: border 0.2s;
        }
        .auth-card input:focus, .auth-card select:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
        }
        .auth-card .btn-primary {
            width: 100%;
            padding: 14px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .auth-card .btn-primary:hover {
            background: #4338ca;
        }
        .auth-card .error {
            color: #dc2626;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
    </style>
</head>
<body>
<div id="app">

    <!-- Оверлей аутентификации -->
    <div id="siteAuthOverlay" class="auth-overlay">
        <div class="auth-card">
            <div class="icon">🔐</div>
            <h2>Вход в АРМ</h2>
            <p class="sub">филиал СХК «Великополье»</p>
            <div style="text-align: left; margin-bottom: 16px;">
                <label style="display: block; font-size: 12px; font-weight: 600; color: #4b5563; margin-bottom: 4px;">Должность</label>
                <select id="authRoleSelect">
                    <option value="Директор">Директор</option>
                    <option value="Инженер по ЭМТП">Инженер по ЭМТП</option>
                    <option value="Техник">Техник</option>
                </select>
            </div>
            <div style="text-align: left; margin-bottom: 20px;">
                <label style="display: block; font-size: 12px; font-weight: 600; color: #4b5563; margin-bottom: 4px;">ПИН-код</label>
                <input type="password" id="sitePinInput" inputmode="numeric" pattern="[0-9]*" placeholder="••••">
            </div>
            <button class="btn-primary" onclick="checkSiteAccess()">Войти</button>
            <p id="authErrorMsg" class="error">❌ Неверный ПИН-код</p>
        </div>
    </div>

    <!-- Оверлей для меню -->
    <div id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- Боковое меню -->
    <aside id="sidebar">
        <div>
            <div class="flex items-center gap-3 mb-8 px-2 border-b border-gray-100/80 pb-5">
                <span class="text-3xl bg-indigo-50 p-2.5 rounded-2xl border border-indigo-100 shadow-sm flex items-center justify-center">🚜</span>
                <div class="flex flex-col justify-center">
                    <span class="text-[10px] font-bold text-indigo-600 uppercase tracking-wider leading-none mb-1 block">филиал СХК</span>
                    <h1 class="text-lg font-black text-gray-800 leading-tight tracking-tight">«Великополье»</h1>
                    <span class="text-[11px] font-medium text-gray-400 leading-none mt-1 block">ГП «Минсктранс»</span>
                </div>
            </div>
            <nav id="menuContainer" class="space-y-1"></nav>
        </div>
        <div class="space-y-4 border-t border-gray-100/80 pt-4 mt-auto">
            <div class="bg-gray-50/80 border border-gray-200/80 rounded-2xl p-3 flex items-center justify-between shadow-sm gap-3">
                <div class="flex items-center gap-3 min-w-0 flex-1">
                    <div id="userAvatar" class="user-avatar">В</div>
                    <div class="min-w-0 flex-1">
                        <p id="userBoxName" class="text-sm font-bold text-gray-800 truncate leading-tight">Загрузка...</p>
                        <p id="userBoxRole" class="text-[10px] font-semibold text-gray-500 uppercase tracking-wide mt-0.5 truncate">Загрузка...</p>
                    </div>
                </div>
                <button onclick="window.logoutSystemUser()" title="Выйти" class="flex-shrink-0 w-8 h-8 flex items-center justify-center bg-white text-gray-500 border border-gray-300 hover:bg-red-50 hover:text-red-600 hover:border-red-300 rounded-xl transition shadow-sm text-sm">🚪</button>
            </div>
            <button id="pwaInstallBtn" onclick="installPWA()" class="hidden w-full bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs font-semibold px-3 py-2.5 rounded-2xl transition text-center shadow-sm">📱 Установить на телефон</button>
            <div class="text-[10px] text-gray-400 text-center pt-1 pb-2 font-medium">АРМ v1.0.1 • by Vol4ek</div>
        </div>
    </aside>

    <!-- Кнопка меню -->
    <button id="menuToggle" onclick="toggleSidebar()">
        <span>☰</span>
        <span class="text hidden sm:inline">Меню</span>
    </button>

    <!-- Основная область -->
    <main id="main" class="module-enter">
        <div id="moduleWorkspace" class="w-full h-full"></div>
    </main>

</div>

<script>
    // ===== Управление кнопкой меню =====
    (function() {
        const menuBtn = document.getElementById('menuToggle');
        let ticking = false;

        function updateButtonVisibility() {
            const scrollY = window.scrollY;
            const sidebar = document.getElementById('sidebar');
            const isOpen = sidebar.classList.contains('open');

            if (isOpen) {
                menuBtn.classList.add('hidden-btn');
                return;
            }

            if (scrollY > 100) {
                menuBtn.classList.add('hidden-btn');
            } else {
                menuBtn.classList.remove('hidden-btn');
            }
        }

        window.addEventListener('scroll', () => {
            if (!ticking) {
                window.requestAnimationFrame(() => {
                    updateButtonVisibility();
                    ticking = false;
                });
                ticking = true;
            }
        });

        // Перехватываем открытие/закрытие меню
        const origToggle = window.toggleSidebar;
        window.toggleSidebar = function() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
            updateButtonVisibility();
        };

        window.closeSidebar = function() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
            updateButtonVisibility();
        };

        window.addEventListener('load', updateButtonVisibility);
    })();

    // ===== Основной код (модули, аутентификация) =====
    (function() {
        const SUPABASE_URL = "https://eaiitxfoqlkmykyqqapg.supabase.co";
        const SUPABASE_KEY = "sb_publishable_3sU4_opgqfZ5tPzk1bW5Ig_6XlX97pm";
        window._supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const APP_MODULES = [
            { id: 'dashboard', name: '🏠 Главная', file: './js/dashboard.js' },
            { id: 'orders', name: '📄 Документы', file: './js/orders.js' },
            { id: 'fleet', name: '🚜 Автопарк', file: './js/fleet.js' },
            { id: 'links', name: '🔗 Ссылки', file: './js/links.js' },
            { id: 'repair_requests', name: '🔧 Заявки', file: './js/repair_requests.js' },
            { id: 'my_lists', name: '📋 Списки', file: './js/my_lists.js' }
        ];

        let currentModuleId = 'dashboard';

        window.switchModule = async (moduleId) => {
            currentModuleId = moduleId;
            renderMenu();
            const workspace = document.getElementById('moduleWorkspace');
            workspace.innerHTML = '<div class="flex items-center justify-center h-full text-gray-400">Загрузка модуля...</div>';
            const target = APP_MODULES.find(m => m.id === moduleId);
            if (target) {
                try {
                    const module = await import(`${target.file}?v=${Date.now()}`);
                    workspace.innerHTML = module.template;
                    if (module.init) module.init();
                    closeSidebar();
                } catch (err) {
                    workspace.innerHTML = `<div class="text-red-500 p-4 bg-red-50 border rounded-xl">Ошибка загрузки: ${err.message}</div>`;
                }
            }
        };

        function renderMenu() {
            const container = document.getElementById('menuContainer');
            if (!container) return;
            container.innerHTML = APP_MODULES.map(mod => {
                const isActive = mod.id === currentModuleId;
                return `<button onclick="switchModule('${mod.id}')" class="nav-item ${isActive ? 'active' : ''}">
                    <span class="text-lg">${mod.name}</span>
                </button>`;
            }).join('');
        }

        // Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => reg.update())
                    .catch(err => console.error('SW error:', err));
            });
        }

        // PWA
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('pwaInstallBtn').classList.remove('hidden');
        });

        window.installPWA = async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                document.getElementById('pwaInstallBtn').classList.add('hidden');
            }
            deferredPrompt = null;
        };

        // Аутентификация
        const USER_PROFILES = {
            "Директор": { name: "Рунцевич Д.С.", pin: "1111" },
            "Инженер по ЭМТП": { name: "Волчек А.А.", pin: "2174" },
            "Техник": { name: "Ладутько И.И.", pin: "1987" }
        };

        window.checkSiteAccess = () => {
            const input = document.getElementById('sitePinInput');
            const error = document.getElementById('authErrorMsg');
            const roleSelect = document.getElementById('authRoleSelect');
            if (!input || !roleSelect) return;
            const role = roleSelect.value;
            const profile = USER_PROFILES[role];
            if (profile && input.value === profile.pin) {
                localStorage.setItem('user_role', role);
                localStorage.setItem('user_name', profile.name);
                localStorage.setItem('site_access_granted', 'true');
                document.getElementById('siteAuthOverlay').style.display = 'none';
                updateSidebarUser();
            } else {
                if (error) error.style.display = 'block';
                input.value = '';
                input.focus();
            }
        };

        function updateSidebarUser() {
            const role = localStorage.getItem('user_role') || 'Сотрудник';
            const name = localStorage.getItem('user_name') || 'Неизвестный';
            document.getElementById('userBoxRole').innerText = role;
            document.getElementById('userBoxName').innerText = name;
            const avatar = document.getElementById('userAvatar');
            if (avatar) {
                const initials = name.split(' ').map(w => w[0]).join('').slice(0, 2);
                avatar.textContent = initials || '?';
            }
        }

        window.logoutSystemUser = () => {
            if (confirm("Выйти из учётной записи?")) {
                localStorage.removeItem('site_access_granted');
                localStorage.removeItem('user_role');
                localStorage.removeItem('user_name');
                verifySession();
            }
        };

        function verifySession() {
            const overlay = document.getElementById('siteAuthOverlay');
            if (localStorage.getItem('site_access_granted') === 'true') {
                overlay.style.display = 'none';
                updateSidebarUser();
                if (!document.querySelector('#moduleWorkspace > *')) {
                    switchModule('dashboard');
                }
            } else {
                overlay.style.display = 'flex';
            }
        }

        // Старт
        document.addEventListener('DOMContentLoaded', () => {
            verifySession();
            renderMenu();
            if (localStorage.getItem('site_access_granted') === 'true') {
                switchModule('dashboard');
            }
        });
    })();
</script>
</body>
</html>

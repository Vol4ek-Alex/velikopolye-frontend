<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АРМ «Великополье»</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        /* Надежный бесшовный сельскохозяйственный узор (точки и линии борозд поля) на чистом SVG */
        .farm-pattern-bg {
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px), linear-gradient(to right, #f1f5f9 1px, transparent 1px);
            background-size: 20px 20px, 40px 40px;
        }
    </style>
</head>
<body class="farm-pattern-bg text-gray-900 min-h-screen flex flex-col md:flex-row">

    <!-- ЭКРАН АВТОРИЗАЦИИ (ЛОГИН-ПАНЕЛЬ) — БЕЗ ФИО -->
    <div id="siteAuthOverlay" class="fixed inset-0 bg-gray-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-4">
        <div class="bg-white border border-gray-100 p-6 rounded-2xl w-full max-w-sm shadow-2xl text-center space-y-5">
            <div class="w-16 h-16 bg-emerald-50 text-emerald-600 rounded-2xl border border-emerald-100 shadow-sm flex items-center justify-center text-3xl mx-auto">
               🔒
            </div>
            <div>
                <p class="text-xs font-bold text-emerald-600 uppercase tracking-wider mb-1">ф-л СХК «Великополье»</p>
                <h2 class="text-xl font-black text-gray-800">Вход в систему АРМ</h2>
                <p class="text-xs text-gray-400 mt-1">Выберите вашу должность и введите ПИН-код</p>
            </div>
        
            <div class="space-y-4 text-left">
                <div>
                    <label class="block text-[10px] font-bold uppercase text-gray-400 tracking-wider mb-1">Должность</label>
                    <select id="authRoleSelect" class="w-full bg-gray-50 border border-gray-300 rounded-xl p-3 text-xs font-bold text-gray-800 focus:outline-none focus:border-emerald-500">
                        <option value="Директор">Директор</option>
                        <option value="Инженер по ЭМТП">Инженер по ЭМТП</option>
                        <option value="Техник">Техник</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-bold uppercase text-gray-400 tracking-wider mb-1">ПИН-Код доступа</label>
                    <input type="password" id="sitePinInput" inputmode="numeric" pattern="[0-9]*" class="w-full bg-gray-50 border border-gray-300 rounded-xl p-3 text-center font-mono text-xl tracking-widest text-gray-900 focus:outline-none focus:border-emerald-500 transition" placeholder="••••">
                </div>

                <button onclick="checkSiteAccess()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3.5 rounded-xl font-bold transition shadow-md text-sm text-center">
                    Войти в систему
                </button>
            </div>
            <p id="authErrorMsg" class="text-xs font-semibold text-red-600 hidden">❌ Неверный ПИН-код! Доступ ограничен.</p>
        </div>
    </div>

    <header class="md:hidden bg-white border-b border-gray-200 p-4 flex justify-between items-center sticky top-0 z-30 shadow-sm">
        <div class="flex items-center gap-2">
            <span class="text-xl">🚜</span>
            <div>
                <h1 class="text-sm font-bold text-gray-800 leading-tight">СХК «Великополье»</h1>
                <p class="text-[10px] text-gray-400 font-medium">ГП «Минсктранс»</p>
            </div>
        </div>
        <button onclick="toggleMobileMenu()" class="text-gray-600 text-2xl">☰</button>
    </header>

    <!-- БОКОВАЯ ПАНЕЛЬ (САЙДБАР) — ТУТ ФИО ОСТАЕТСЯ И ВЫВОДИТСЯ -->
    <aside id="sidebar" class="fixed md:sticky top-0 left-0 z-40 w-64 h-screen bg-white border-r border-gray-200 flex flex-col justify-between p-4 transition-transform -translate-x-full md:translate-x-0 shadow-xl md:shadow-none">
        <div>
            <div class="hidden md:flex items-center gap-3 mb-8 px-2 border-b border-gray-100 pb-5">
                <span class="text-3xl bg-emerald-50 p-2.5 rounded-xl border border-emerald-100 shadow-sm flex items-center justify-center">🚜</span>
                <div class="flex flex-col justify-center">
                    <span class="text-[10px] font-bold text-emerald-600 uppercase tracking-wider leading-none mb-1 block">ф-л СХК</span>
                    <h1 class="text-lg font-black text-gray-800 leading-tight tracking-tight">«Великополье»</h1>
                    <span class="text-[11px] font-medium text-gray-400 leading-none mt-1 block">ГП «Минсктранс»</span>
                </div>
            </div>
            <nav id="menuContainer" class="space-y-1"></nav>
        </div>

        <div class="space-y-3 border-t border-gray-100 pt-4">
            <!-- БЛОК ПРОФИЛЯ С ФИО, ДОЛЖНОСТЬЮ И КНОПКАМИ -->
            <div class="bg-gray-50 border border-gray-200 rounded-xl p-3 space-y-2.5 shadow-3xs">
                <div class="flex items-center gap-2.5">
                    <span class="text-xl">👤</span>
                    <div class="truncate">
                        <!-- Здесь ФИО выводится, как и требовалось -->
                        <p id="userBoxName" class="text-xs font-black text-gray-900 truncate leading-tight">Александр А. В.</p>
                        <p id="userBoxRole" class="text-[10px] font-bold text-gray-500 uppercase tracking-wide mt-0.5">Загрузка...</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-1.5 pt-2 border-t border-gray-200/60">
                    <button onclick="window.forceClearSystemCache()" title="Принудительно обновить систему и сбросить кэш" class="bg-white hover:bg-gray-100 text-gray-700 border border-gray-300 text-[10px] font-bold py-1.5 rounded-lg transition text-center shadow-3xs">
                        🔄 Кэш
                    </button>
                    <button onclick="window.logoutSystemUser()" title="Выйти из аккаунта" class="bg-red-50 hover:bg-red-100 text-red-700 border border-red-200 text-[10px] font-bold py-1.5 rounded-lg transition text-center shadow-3xs">
                        🚪 Выйти
                    </button>
                </div>
            </div>

            <button id="pwaInstallBtn" onclick="installPWA()" class="hidden w-full bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs font-semibold px-3 py-2.5 rounded-xl transition text-center">
                📱 Установить на телефон
            </button>
            <div class="text-xs text-gray-400 text-center">АРМ v1.0 • Модульный • @Vol4ek</div>
        </div>
    </aside>

    <div id="menuOverlay" onclick="toggleMobileMenu()" class="fixed inset-0 bg-black/40 z-30 hidden md:hidden"></div>

    <main id="moduleWorkspace" class="flex-1 p-4 md:p-8 max-w-7xl mx-auto w-full relative z-10"></main>

    <script type="module">
        const SUPABASE_URL = "https://eaiitxfoqlkmykyqqapg.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_3sU4_opgqfZ5tPzk1bW5Ig_6XlX97pm"; 
        window._supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const APP_MODULES = [
            { id: 'dashboard', name: '🏠 Главная', file: './js/dashboard.js' },
            { id: 'fleet', name: '🚜 Автопарк', file: './js/fleet.js' }
        ];

        let currentModuleId = 'dashboard';

        window.switchModule = async (moduleId) => {
            currentModuleId = moduleId;
            renderMenu();

            const workspace = document.getElementById('moduleWorkspace');
            workspace.innerHTML = '<div class="text-center text-gray-400 py-12">Загрузка модуля...</div>';

            const targetModule = APP_MODULES.find(m => m.id === moduleId);
            if (targetModule) {
                try {
                    const module = await import(`${targetModule.file}?v=${Date.now()}`);
                    workspace.innerHTML = module.template;
                    if (module.init) module.init();
                } catch (err) {
                    workspace.innerHTML = `<div class="text-red-500 p-4 bg-red-50 border rounded-xl">Ошибка загрузки файла модуля: ${err.message}</div>`;
                }
            }
        };

        function renderMenu() {
            const container = document.getElementById('menuContainer');
            if (!container) return;
            container.innerHTML = APP_MODULES.map(mod => {
                const isActive = mod.id === currentModuleId;
                const activeClasses = isActive ? 'bg-emerald-50 text-emerald-700 font-semibold shadow-sm' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900';
                return `<button onclick="switchModule('${mod.id}'); if(window.innerWidth < 768) toggleMobileMenu();" class="w-full text-left px-4 py-3 rounded-xl text-sm font-medium transition flex items-center justify-between ${activeClasses}"><span>${mod.name}</span>${isActive ? '<span class="w-1.5 h-1.5 bg-emerald-600 rounded-full"></span>' : ''}</button>`;
            }).join('');
        }

        window.toggleMobileMenu = () => {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('menuOverlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        };

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => {
                        reg.update();
                        reg.onupdatefound = () => {
                            const installingWorker = reg.installing;
                            installingWorker.onstatechange = () => {
                                if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    setTimeout(() => { window.location.reload(); }, 1000);
                                }
                            };
                        };
                    })
                    .catch(err => console.error('❌ Ошибка SW:', err));
            });
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); 
            deferredPrompt = e;
            const btn = document.getElementById('pwaInstallBtn');
            if (btn) btn.classList.remove('hidden');
        });

        window.installPWA = async () => {
            if (!deferredPrompt) return; 
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                document.getElementById('pwaInstallBtn').classList.add('hidden');
            }
            deferredPrompt = null;
        };

        // --- ЛОГИКА АВТОРИЗАЦИИ И СЕССИЙ ---
        const SITE_PIN = "7777"; 

        window.checkSiteAccess = () => {
            const input = document.getElementById('sitePinInput');
            const error = document.getElementById('authErrorMsg');
            const roleSelect = document.getElementById('authRoleSelect');
            
            if (input && input.value === SITE_PIN) {
                if (roleSelect) {
                    localStorage.setItem('user_role', roleSelect.value);
                }
                localStorage.setItem('site_access_granted', 'true');
                document.getElementById('siteAuthOverlay').classList.add('hidden');
                updateSidebarUser();
            } else {
                if (error) error.classList.remove('hidden');
                if (input) { input.value = ''; input.focus(); }
            }
        };

        function updateSidebarUser() {
            const role = localStorage.getItem('user_role') || 'Сотрудник';
            const roleEl = document.getElementById('userBoxRole');
            if (roleEl) roleEl.innerText = role;
        }

        // Принудительное очищение кэша Service Worker и локальной памяти
        window.forceClearSystemCache = () => {
            if (confirm("Вы действительно хотите принудительно обновить приложение и очистить локальный кэш?")) {
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.getRegistrations().then(registrations => {
                        for (let registration of registrations) {
                            registration.unregister();
                        }
                    });
                }
                const currentRole = localStorage.getItem('user_role');
                const access = localStorage.getItem('site_access_granted');
                localStorage.clear();
                sessionStorage.clear();
                
                if (currentRole) localStorage.setItem('user_role', currentRole);
                if (access) localStorage.setItem('site_access_granted', access);
                
                window.location.reload(true);
            }
        };

        // Разлогин из системы
        window.logoutSystemUser = () => {
            if (confirm("Выйти из текущей учетной записи?")) {
                localStorage.removeItem('site_access_granted');
                localStorage.removeItem('user_role');
                verifySession();
            }
        };

        function verifySession() {
            const overlay = document.getElementById('siteAuthOverlay');
            if (localStorage.getItem('site_access_granted') === 'true') {
                if (overlay) overlay.classList.add('hidden');
                updateSidebarUser();
            } else {
                if (overlay) overlay.classList.remove('hidden');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            verifySession();
            switchModule('dashboard');
        });
    </script>
</body>
</html>

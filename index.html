<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АРМ «Великополье»</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="manifest" href="manifest.json">
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col md:flex-row">

    <div id="siteAuthOverlay" class="fixed inset-0 bg-gray-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-4">
        <div class="bg-white border border-gray-100 p-6 rounded-2xl w-full max-w-sm shadow-2xl text-center space-y-5">
            <div class="w-16 h-16 bg-emerald-50 text-emerald-600 rounded-2xl border border-emerald-100 shadow-sm flex items-center justify-center text-3xl mx-auto">
               🔒
            </div>
            <div>
                <p class="text-xs font-bold text-emerald-600 uppercase tracking-wider mb-1">ф-л СХК «Великополье»</p>
                <h3 class="text-xl font-black text-gray-900 tracking-tight">Авторизация в системе</h3>
                <p class="text-xs text-gray-500 font-medium mt-1">Доступ только для сотрудников предприятия</p>
            </div>
            <div class="space-y-2">
                <input type="password" id="sitePinInput" maxlength="4" placeholder="Введите ПИН-код" 
                       class="w-full text-center tracking-[0.5em] text-xl font-bold bg-gray-50 border-2 border-gray-200 rounded-xl p-3 focus:outline-none focus:border-emerald-600 transition text-gray-900">
                <p id="authErrorMsg" class="text-red-600 text-xs font-bold hidden">❌ Неверный ПИН-код доступа</p>
            </div>
            <button onclick="window.checkSiteAccess()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold p-3 rounded-xl transition shadow-md">
                Войти в АРМ
            </button>
        </div>
    </div>

    <div class="w-full md:w-64 bg-white dark:bg-gray-900 border-b md:border-b-0 md:border-r border-gray-200 dark:border-gray-800 p-5 flex flex-col justify-between shrink-0">
        <div class="space-y-6">
            <div class="flex items-start gap-3">
                <div class="w-10 h-10 bg-emerald-50 dark:bg-emerald-950/50 rounded-xl border border-emerald-100 dark:border-emerald-900 flex items-center justify-center text-xl shadow-xs">
                    🚜
                </div>
                <div>
                    <p class="text-xs font-bold text-emerald-600 uppercase tracking-wider mb-1">ф-л СХК «Великополье»</p>
                    <h1 class="text-lg font-black text-gray-900 dark:text-white tracking-tight leading-tight">«Великополье»</h1>
                    <p class="text-[10px] text-gray-500 dark:text-gray-400 font-medium mt-0.5">ГП «Минсктранс»</p>
                </div>
            </div>

            <div class="flex items-center justify-between bg-gray-100 dark:bg-gray-800/60 p-2 rounded-xl border border-gray-200 dark:border-gray-700">
                <span class="text-xs font-bold text-gray-600 dark:text-gray-400 pl-1">Режим экрана</span>
                <button onclick="window.toggleDarkMode()" id="themeBtn" class="w-8 h-8 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-yellow-400 transition shadow-xs text-sm flex items-center justify-center border border-gray-300/70 dark:border-gray-600">
                    🌙
                </button>
            </div>

            <nav class="space-y-1">
                <button id="nav-dashboard" onclick="window.switchModule('dashboard')" 
                        class="w-full flex items-center gap-2 px-3 py-2.5 rounded-lg text-xs font-bold transition text-left">
                    <span>📊</span> Главная
                </button>
                <button id="nav-fleet" onclick="window.switchModule('fleet')" 
                        class="w-full flex items-center gap-2 px-3 py-2.5 rounded-lg text-xs font-bold transition text-left">
                    <span>🚜</span> Автопарк
                </button>
            </nav>
        </div>

        <div class="mt-6 pt-4 border-t border-gray-100 dark:border-gray-800 space-y-3">
            <button id="btnInstallPWA" class="hidden w-full bg-blue-50 dark:bg-blue-950/40 border border-blue-200 dark:border-blue-900 hover:bg-blue-100 dark:hover:bg-blue-900/60 text-blue-700 dark:text-blue-300 px-3 py-2 rounded-lg text-[11px] font-bold transition items-center justify-center gap-1.5">
                📱 Установить на телефон
            </button>
            <div class="text-[10px] text-gray-400 dark:text-gray-500 font-medium leading-relaxed">
                АРМ v1.0 • Модульный • @Vol4ek
            </div>
        </div>
    </div>

    <main id="mainContent" class="flex-1 p-4 md:p-6 lg:p-8 overflow-y-auto">
        <div class="text-gray-400 text-xs py-12 text-center">Загрузка модулей системы...</div>
    </main>

    <script type="module">
        import { supabaseConfig } from './js/config.js';
        
        // Глобальный Supabase клиент
        window._supabase = supabase.createClient(supabaseConfig.url, supabaseConfig.key);

        // Кэш данных в памяти
        window.globalVehicles = [];
        window.globalCategories = [];
        window.globalTasks = [];

        // Импорт модулей
        const modules = {
            dashboard: () => import('./js/dashboard.js'),
            fleet: () => import('./js/fleet.js')
        };

        // Глобальная функция переключения модулей
        window.switchModule = async function(moduleName) {
            if (!modules[moduleName]) return;

            // Очищаем интервал дашборда при уходе с него
            if (window.dashIntervalId) {
                clearInterval(window.dashIntervalId);
                window.dashIntervalId = null;
            }

            // Визуальное обновление пунктов меню
            ['dashboard', 'fleet'].forEach(name => {
                const btn = document.getElementById(`nav-${name}`);
                if (btn) {
                    if (name === moduleName) {
                        btn.className = "w-full flex items-center justify-between px-3 py-2.5 rounded-lg text-xs font-black transition text-left bg-emerald-50 dark:bg-emerald-950/50 text-emerald-700 dark:text-emerald-400 border border-emerald-500/20";
                    } else {
                        btn.className = "w-full flex items-center gap-2 px-3 py-2.5 rounded-lg text-xs font-bold transition text-left text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800/50 hover:text-gray-900 dark:hover:text-gray-100";
                    }
                }
            });

            try {
                const mod = await modules[moduleName]();
                document.getElementById('mainContent').innerHTML = mod.template;
                if (typeof mod.init === 'function') {
                    await mod.init();
                }
            } catch (err) {
                console.error(`Ошибка загрузки модуля ${moduleName}:`, err);
                document.getElementById('mainContent').innerHTML = `<div class="text-red-500 text-xs">Ошибка загрузки интерфейса: ${err.message}</div>`;
            }
        };

        // --- ЛОГИКА ТЕМНОЙ ТЕМЫ ---
        window.toggleDarkMode = function() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            
            const btn = document.getElementById('themeBtn');
            if (btn) btn.innerText = isDark ? '☀️' : '🌙';
        };

        // --- ГЛОБАЛЬНАЯ ЗАЩИТА САЙТА ---
        const SITE_PIN = "7777"; 

        window.checkSiteAccess = () => {
            const input = document.getElementById('sitePinInput');
            const error = document.getElementById('authErrorMsg');
            
            if (input && input.value === SITE_PIN) {
                localStorage.setItem('site_access_granted', 'true');
                document.getElementById('siteAuthOverlay').classList.add('hidden');
            } else {
                if (error) error.classList.remove('hidden');
                if (input) { input.value = ''; input.focus(); }
            }
        };

        window.verifySession = () => {
            const overlay = document.getElementById('siteAuthOverlay');
            if (localStorage.getItem('site_access_granted') === 'true') {
                if (overlay) overlay.classList.add('hidden');
            } else {
                if (overlay) overlay.classList.remove('hidden');
            }
        };

        // Инициализация темы при старте скрипта модуля
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
            document.documentElement.classList.add('dark');
            const btn = document.getElementById('themeBtn');
            if (btn) btn.innerText = '☀️';
        }

        // PWA обработчик
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const btn = document.getElementById('btnInstallPWA');
            if (btn) btn.style.display = 'flex';
        });

        const btnInstall = document.getElementById('btnInstallPWA');
        if (btnInstall) {
            btnInstall.addEventListener('click', async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (deferredPrompt && outcome === 'accepted') {
                    btnInstall.style.display = 'none';
                }
                deferredPrompt = null;
            });
        }

        // Запуск проверки сессии и загрузка дашборда
        window.verifySession();
        window.switchModule('dashboard');
    </script>
</body>
</html>

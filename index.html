    <style>
        /* ===== CSS-ПЕРЕМЕННЫЕ ДЛЯ ТЕМ ===== */
        :root {
            /* Светлая тема (по умолчанию) */
            --bg-body: linear-gradient(145deg, #f3f4f6 0%, #e5e7eb 100%);
            --bg-sidebar: rgba(255,255,255,0.95);
            --bg-sidebar-border: rgba(0,0,0,0.05);
            --bg-card: #ffffff;
            --bg-card-hover: #f9fafb;
            --bg-input: #f9fafb;
            --bg-input-border: #e5e7eb;
            --bg-gray-50: #f9fafb;
            --bg-gray-100: #f3f4f6;
            --bg-gray-200: #e5e7eb;
            --bg-gray-300: #d1d5db;
            --bg-gray-400: #9ca3af;
            --bg-gray-500: #6b7280;
            --bg-gray-600: #4b5563;
            --bg-gray-700: #374151;
            --bg-gray-800: #1f2937;
            --bg-gray-900: #111827;
            --text-primary: #1f2937;
            --text-secondary: #4b5563;
            --text-muted: #6b7280;
            --text-light: #9ca3af;
            --text-white: #ffffff;
            --border-light: rgba(0,0,0,0.05);
            --border-gray-100: #f3f4f6;
            --border-gray-200: #e5e7eb;
            --border-gray-300: #d1d5db;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            --scrollbar-thumb: #d1d5db;
            --scrollbar-thumb-hover: #9ca3af;
            --nav-item-hover: #f3f4f6;

            --nav-item-active-text: #4f46e5;

        /* Тёмная тема */
        [data-theme="dark"] {
            --bg-body: linear-gradient(145deg, #111827 0%, #1f2937 100%);
            --bg-sidebar: rgba(31, 41, 55, 0.95);

            --bg-input: #374151;
            --bg-input-border: #4b5563;
            --bg-gray-50: #1f2937;
            --bg-gray-100: #374151;
            --bg-gray-200: #4b5563;
            --bg-gray-300: #6b7280;
            --bg-gray-400: #9ca3af;
            --bg-gray-500: #d1d5db;
            --bg-gray-600: #e5e7eb;
            --bg-gray-700: #f3f4f6;
            --bg-gray-800: #f9fafb;
            --bg-gray-900: #ffffff;
            --text-primary: #f9fafb;
            --text-secondary: #d1d5db;
            --text-muted: #9ca3af;
            --text-light: #6b7280;
            --text-white: #ffffff;
            --border-light: rgba(255,255,255,0.05);
            --border-gray-100: #374151;
            --border-gray-200: #4b5563;
            --border-gray-300: #6b7280;

            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.6);
            --scrollbar-thumb: #4b5563;
            --scrollbar-thumb-hover: #6b7280;
            --nav-item-hover: #374151;
            --nav-item-active: #312e81;
            --nav-item-active-text: #818cf8;
            --nav-group-title: #6b7280;
            --nav-group-border: #374151;
            --auth-card-bg: #1f2937;
            --auth-card-shadow: 0 20px 60px rgba(0,0,0,0.6);
            --toast-bg: #f9fafb;
            --toast-text: #1f2937;
            --module-bg: transparent;
        }

        /* ===== ОСНОВНЫЕ СТИЛИ ===== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            height: 100vh;
            overflow: hidden;
            transition: background 0.4s ease;
        }
        #app {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }
        #sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            width: 280px;
            background: var(--bg-sidebar);
            backdrop-filter: blur(8px);
            border-right: 1px solid var(--bg-sidebar-border);
            box-shadow: 4px 0 20px rgba(0,0,0,0.05);
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px 16px;
            overflow-y: auto;
        }
        #sidebar.open {
            transform: translateX(0);
        }
        #sidebarOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #sidebarOverlay.active {
            opacity: 1;
            pointer-events: all;
        }
        #main {
            flex: 1;
            height: 100vh;
            overflow-y: auto;
            padding: 16px;
            padding-top: 80px;
            background: var(--module-bg);
            transition: background 0.4s ease;
        }
        @media (min-width: 768px) {
            #main {
                padding: 32px;
                padding-top: 90px;
            }
        }
        #menuToggle {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1001;
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 14px;
            padding: 10px 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: 500;
            color: var(--text-primary);
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        #menuToggle.hidden-btn {
            opacity: 0 !important;
            transform: translateY(-20px) !important;
            pointer-events: none !important;
        }
        #menuToggle:hover {
            background: rgba(255,255,255,0.85);
            box-shadow: 0 6px 24px rgba(0,0,0,0.1);
        }
        #menuToggle span.text {
            font-size: 14px;
        }
        @media (min-width: 768px) {
            #menuToggle {
                top: 24px;
                left: 24px;
                padding: 12px 20px;
            }
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.15s;
            cursor: pointer;
            width: 100%;
            border: none;
            background: transparent;
        }
        .nav-item:hover {
            background: var(--nav-item-hover);
            color: var(--text-primary);
        }
        .nav-item.active {
            background: var(--nav-item-active);
            color: var(--nav-item-active-text);
            font-weight: 600;
            border-right: 3px solid var(--nav-item-active-text);
        }
        .nav-group-title {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--nav-group-title);
            padding: 12px 12px 6px 12px;
            border-bottom: 1px solid var(--nav-group-border);
            margin-bottom: 4px;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            text-transform: uppercase;
            flex-shrink: 0;
        }
        #main::-webkit-scrollbar { width: 6px; }
        #main::-webkit-scrollbar-track { background: transparent; }
        #main::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 10px; }
        #main::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-hover); }
        .module-enter {
            animation: fadeIn 0.4s ease-out;

            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .auth-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .auth-card {
            background: var(--auth-card-bg);
            border-radius: 32px;
            max-width: 440px;
            width: 100%;
            padding: 32px;
            box-shadow: var(--auth-card-shadow);
            text-align: center;
            transition: background 0.3s, box-shadow 0.3s;
        }
        .auth-card .icon {
            width: 72px;
            height: 72px;
            background: #eef2ff;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;

        }

            font-size: 24px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .auth-card p.sub {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }
        .auth-card input, .auth-card select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--bg-input-border);
            border-radius: 16px;
            font-size: 14px;
            background: var(--bg-input);
            color: var(--text-primary);
            transition: border 0.2s;
        }
        .auth-card input:focus, .auth-card select:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
        }
        .auth-card .btn-primary {
            width: 100%;
            padding: 14px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .auth-card .btn-primary:hover {
            background: #4338ca;
        }
        .auth-card .error {
            color: #dc2626;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        /* Кнопка PWA только в оверлее (скрыта в сайдбаре) */
        #pwaInstallBtn {
            display: none !important;
        }

        /* Переключатель темы */
        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 10px;
            background: var(--bg-gray-100);
            border: 1px solid var(--border-gray-200);
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            width: 100%;
        }
        .theme-toggle:hover {
            background: var(--bg-gray-200);
        }
        .theme-toggle .icon {
            font-size: 18px;
        }
                /* ===== ПЕРЕОПРЕДЕЛЕНИЕ TAILWIND ДЛЯ ТЁМНОЙ ТЕМЫ ===== */
        .bg-white {
            background-color: var(--bg-card) !important;

            background-color: var(--bg-gray-50) !important;

            background-color: var(--bg-gray-100) !important;

        .bg-gray-200 {
            background-color: var(--bg-gray-200) !important;

        .border-gray-200 {
            border-color: var(--border-gray-200) !important;
        }

        }
        .text-gray-900 {
            color: var(--text-primary) !important;
        }
        .text-gray-800 {
            color: var(--text-primary) !important;
        }
        .text-gray-700 {
            color: var(--text-secondary) !important;
        }
        .text-gray-600 {
            color: var(--text-muted) !important;
        }
        .text-gray-500 {
            color: var(--text-muted) !important;

        .text-gray-400 {

        .border-gray-100 {

        .shadow-sm {

            box-shadow: var(--shadow-md) !important;

    </style>
</head>

<script>
    // ===== УПРАВЛЕНИЕ ТЕМОЙ =====
    (function() {
        // Определяем сохранённую тему
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeUI(savedTheme);

        window.toggleTheme = function() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeUI(next);
        };

        function updateThemeUI(theme) {
            const icon = document.getElementById('themeIcon');
            const label = document.getElementById('themeLabel');
            if (theme === 'dark') {
                icon.textContent = '☀️';
                label.textContent = 'Светлая тема';
            } else {
                icon.textContent = '🌙';
                label.textContent = 'Тёмная тема';
            }
        }

        // Синхронизация темы при загрузке страницы
        window.addEventListener('load', function() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
            updateThemeUI(theme);
        });
    })();

    // ===== Управление кнопкой меню =====
    (function() {
        const menuBtn = document.getElementById('menuToggle');
        let ticking = false;

        function updateButtonVisibility() {
            const scrollY = window.scrollY;
            const sidebar = document.getElementById('sidebar');
            const isOpen = sidebar.classList.contains('open');

            if (isOpen) {
                menuBtn.classList.add('hidden-btn');
                return;
            }

            if (scrollY > 100) {
                menuBtn.classList.add('hidden-btn');
            } else {
                menuBtn.classList.remove('hidden-btn');
            }
        }

        window.addEventListener('scroll', () => {
            if (!ticking) {
                window.requestAnimationFrame(() => {
                    updateButtonVisibility();
                    ticking = false;
                });
                ticking = true;
            }
        });

        // Перехватываем открытие/закрытие меню
        window.toggleSidebar = function() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
            updateButtonVisibility();
        };

        window.closeSidebar = function() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
            updateButtonVisibility();
        };

        window.addEventListener('load', updateButtonVisibility);
    })();

    (function() {

        window._supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Модули с группировкой

            { id: 'fleet', name: '🚜 Автопарк', file: './js/fleet.js', group: 'main' },

            { id: 'my_lists', name: '📋 Списки', file: './js/my_lists.js', group: 'docs' },

            { id: 'links', name: '🔗 Ссылки', file: './js/links.js', group: 'tools' }
        ];

        let currentModuleId = 'dashboard';

        window.switchModule = async (moduleId) => {
            currentModuleId = moduleId;
            renderMenu();
            const workspace = document.getElementById('moduleWorkspace');
            workspace.innerHTML = `
            <div class="flex items-center justify-center h-full">
                <div class="text-center">
                    <div class="animate-spin rounded-full h-8 w-8 border-2 border-indigo-600 border-t-transparent mx-auto"></div>
                    <p class="text-gray-400 mt-4">Загрузка модуля...</p>
                </div>
            </div>
            `;
            const target = APP_MODULES.find(m => m.id === moduleId);
            if (target) {
                try {
                    const module = await import(`${target.file}?v=${Date.now()}`);
                    workspace.innerHTML = module.template;
                    if (module.init) module.init();
                    closeSidebar();
                } catch (err) {
                    workspace.innerHTML = `<div class="text-red-500 p-4 bg-red-50 border rounded-xl">Ошибка загрузки: ${err.message}</div>`;
                }
            }
        };

        function renderMenu() {
            const container = document.getElementById('menuContainer');
            if (!container) return;

            const groups = {
                main: { title: 'Основное', modules: [] },
                docs: { title: 'Документы', modules: [] },
                tools: { title: 'Сервисы', modules: [] }
            };

            APP_MODULES.forEach(mod => {
                if (groups[mod.group]) {
                    groups[mod.group].modules.push(mod);
                }
            });

            let html = '';
            for (const [key, group] of Object.entries(groups)) {
                if (group.modules.length === 0) continue;
                html += `<div class="nav-group-title">${group.title}</div>`;
                group.modules.forEach(mod => {
                    const isActive = mod.id === currentModuleId;
                    const activeClass = isActive ? 'active' : '';
                    html += `
                        <button onclick="switchModule('${mod.id}')" class="nav-item ${activeClass}">
                            <span class="text-base">${mod.name}</span>
                        </button>
                    `;
                });
            }

            container.innerHTML = html;
        }

        // Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => reg.update())
                    .catch(err => console.error('SW error:', err));
            });
        }

        // PWA (кнопка не показывается)
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        // Аутентификация
        const USER_PROFILES = {
            "Директор": { name: "Рунцевич Д.С.", pin: "1111" },
            "Инженер по ЭМТП": { name: "Волчек А.А.", pin: "2174" },
            "Техник": { name: "Ладутько И.И.", pin: "1987" },
            "Заместитель директора": { name: "Новик А.А.", pin: "2222" }
        };

        window.checkSiteAccess = () => {
            const input = document.getElementById('sitePinInput');
            const error = document.getElementById('authErrorMsg');
            const roleSelect = document.getElementById('authRoleSelect');
            if (!input || !roleSelect) return;
            const role = roleSelect.value;
            const profile = USER_PROFILES[role];
            if (profile && input.value === profile.pin) {
                localStorage.setItem('user_role', role);
                localStorage.setItem('user_name', profile.name);
                localStorage.setItem('site_access_granted', 'true');
                document.getElementById('siteAuthOverlay').style.display = 'none';
                updateSidebarUser();
            } else {
                if (error) error.style.display = 'block';
                input.value = '';
                input.focus();
            }
        };

        function updateSidebarUser() {
            const role = localStorage.getItem('user_role') || 'Сотрудник';
            const name = localStorage.getItem('user_name') || 'Неизвестный';
            document.getElementById('userBoxRole').innerText = role;
            document.getElementById('userBoxName').innerText = name;
            const avatar = document.getElementById('userAvatar');
            if (avatar) {
                const initials = name.split(' ').map(w => w[0]).join('').slice(0, 2);
                avatar.textContent = initials || '?';
            }
        }

        window.logoutSystemUser = () => {
            if (confirm("Выйти из учётной записи?")) {
                localStorage.removeItem('site_access_granted');
                localStorage.removeItem('user_role');
                localStorage.removeItem('user_name');
                verifySession();
            }
        };

        function verifySession() {
            const overlay = document.getElementById('siteAuthOverlay');
            if (localStorage.getItem('site_access_granted') === 'true') {
                overlay.style.display = 'none';
                updateSidebarUser();
                if (!document.querySelector('#moduleWorkspace > *')) {
                    switchModule('dashboard');
                }
            } else {
                overlay.style.display = 'flex';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            verifySession();
            renderMenu();
            if (localStorage.getItem('site_access_granted') === 'true') {
                switchModule('dashboard');
            }
        });
    })();

    // ===== ТОСТ-УВЕДОМЛЕНИЯ =====
    window.showToast = (message, type = 'info') => {
        const toast = document.createElement('div');
        toast.className = `fixed bottom-6 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-xl shadow-lg z-[200] text-sm font-medium transition-all duration-300 opacity-0`;
        toast.textContent = message;
        if (type === 'info') toast.style.backgroundColor = '#4f46e5';
        else if (type === 'success') toast.style.backgroundColor = '#059669';
        else if (type === 'error') toast.style.backgroundColor = '#dc2626';
        else toast.style.backgroundColor = '#1f2937';
        toast.style.color = '#ffffff';
        document.body.appendChild(toast);

        setTimeout(() => { toast.style.opacity = '1'; }, 50);
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
    };

    // ===== УПРАВЛЕНИЕ ВЕРСИЕЙ =====
    const APP_VERSION = '1.0.4';
    const storedVersion = localStorage.getItem('app_version');
    if (storedVersion !== APP_VERSION) {
        localStorage.clear();
        sessionStorage.clear();
        localStorage.setItem('app_version', APP_VERSION);
        console.log('🧹 Кэш данных очищен (новая версия)');
    }

    // ===== SERVICE WORKER С ПРИНУДИТЕЛЬНЫМ ОБНОВЛЕНИЕМ =====
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' })
            .then(reg => {
                reg.update();
                reg.addEventListener('updatefound', () => {
                    const newWorker = reg.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            console.log('📦 Новая версия приложения доступна!');
                            if (window.showToast) {
                                window.showToast('Приложение обновлено!', 'info');
                            }
                            setTimeout(() => { window.location.reload(); }, 2000);
                        }
                    });
                });
            })
            .catch(err => console.error('SW error:', err));
    }

    window.forceUpdateApp = () => {
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistration().then(reg => {
                if (reg) { reg.update(); alert('Поиск обновлений...'); }
            });
        }
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АРМ «Великополье»</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #111827; color: #F9FAFB; }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col">

    <header class="bg-[#0B0F19] border-b border-[#374151] px-4 py-3 flex justify-between items-center">
        <h1 id="app-title" class="text-lg font-bold text-white">СХК «Великополье»</h1>
        <button onclick="loadModules()" class="text-sm text-[#9CA3AF] active:text-white">🔄 Обновить</button>
    </header>

    <main class="flex-1 flex flex-col md:flex-row">
        <div id="sidebar" class="bg-[#0B0F19] p-4 space-y-2 md:w-64 border-r border-[#374151]">
            <p class="text-xs text-[#9CA3AF] font-semibold uppercase tracking-wider mb-2">Модули АРМ</p>
            <div id="modules-menu" class="space-y-1"></div>
        </div>

        <div class="flex-1 p-4">
            <div id="module-card" class="bg-[#1F2937] border border-[#374151] rounded-lg p-5 shadow-xl hidden">
                <h2 id="module-name" class="text-xl font-bold text-white mb-4">Выберите раздел</h2>
                <div id="module-content" class="space-y-4"></div>
            </div>
        </div>
    </main>

    <script>
        // Сюда потом вставишь адрес от Render
        const SERVER_URL = 'https://velikopolye-backend.onrender.com'; 
        let currentInputs = {};

        async function loadModules() {
            try {
                const res = await fetch(`${SERVER_URL}/api/modules`);
                const modules = await res.json();
                const menuContainer = document.getElementById('modules-menu');
                menuContainer.innerHTML = '';

                Object.entries(modules).forEach(([id, title]) => {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left px-3 py-3 rounded text-[#9CA3AF] hover:bg-[#1F2937] hover:text-white active:bg-[#3B82F6] transition font-medium text-sm";
                    btn.innerText = title;
                    btn.onclick = () => openModule(id);
                    menuContainer.appendChild(btn);
                });
            } catch (err) {
                alert('Ошибка соединения с сервером АРМ');
            }
        }

        async function openModule(id) {
            const res = await fetch(`${SERVER_URL}/api/module/${id}`);
            const moduleData = await res.json();
            
            document.getElementById('module-name').innerText = moduleData.title;
            const content = document.getElementById('module-content');
            content.innerHTML = '';
            currentInputs = {};

            moduleData.schema.forEach(elem => {
                if (elem.type === 'label') {
                    const p = document.createElement('p');
                    p.className = "text-sm text-[#9CA3AF]";
                    p.innerText = elem.text;
                    content.appendChild(p);
                } 
                else if (elem.type === 'input') {
                    const div = document.createElement('div');
                    div.className = "flex flex-col space-y-1";
                    div.innerHTML = `
                        <label class="text-xs text-[#9CA3AF] font-bold">${elem.label}</label>
                        <input type="text" id="${elem.id}" placeholder="${elem.placeholder}" 
                               class="bg-[#111827] border border-[#374151] rounded px-3 py-2 text-white focus:outline-none focus:border-[#3B82F6]">
                    `;
                    content.appendChild(div);
                } 
                else if (elem.type === 'button') {
                    const btn = document.createElement('button');
                    btn.className = "w-full bg-[#3B82F6] text-white py-2.5 rounded font-bold hover:bg-blue-600 active:scale-95 transition text-sm shadow-lg";
                    btn.innerText = elem.text;
                    btn.onclick = () => sendAction(elem.action_id, moduleData.schema);
                    content.appendChild(btn);
                }
            });

            document.getElementById('module-card').classList.remove('hidden');
        }

        async function sendAction(actionId, schema) {
            const payload = {};
            schema.forEach(elem => {
                if (elem.type === 'input') {
                    const inputEl = document.getElementById(elem.id);
                    if (inputEl) payload[elem.id] = inputEl.value;
                }
            });

            const res = await fetch(`${SERVER_URL}/api/action/${actionId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await res.json();
            alert(result.message);
        }

        loadModules();
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(reg => console.log('SW registered!', reg))
                    .catch(err => console.log('SW registration failed!', err));
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>АРМ «Великополье»</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <style>
        #mobileMenuOverlay { transition: opacity 0.3s; }
        #mobileDrawer { transition: transform 0.3s ease-out; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased overscroll-none">

    <header class="bg-slate-800 border-b border-slate-700 sticky top-0 z-40 shadow-md viewport-fit">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center h-16">
            <div class="flex items-center gap-3">
                <button onclick="toggleMobileMenu()" class="md:hidden p-1.5 bg-slate-700 rounded-lg hover:bg-slate-600 transition">
                    <svg class="w-6 h-6 text-slate-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </button>
                <h1 class="font-bold tracking-tight text-white flex items-center gap-2">
                    <span class="text-xl">🚜</span>
                    <span class="hidden xs:inline text-lg">СХК «Великополье»</span>
                    <span class="inline xs:hidden text-lg">СХК</span>
                </h1>
            </div>

            <button onclick="refreshCurrentModule()" class="bg-blue-600 hover:bg-blue-500 text-white p-2 md:px-4 md:py-2 rounded-xl flex items-center gap-2 transition shadow-md shadow-blue-600/20">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                <span class="hidden md:inline text-sm font-medium">Обновить данные</span>
            </button>
        </div>
    </header>

    <div id="mobileMenuOverlay" class="fixed inset-0 bg-slate-950/80 z-50 opacity-0 pointer-events-none hidden" onclick="toggleMobileMenu()">
        <aside id="mobileDrawer" class="fixed top-0 left-0 bottom-0 w-[280px] bg-slate-800 p-5 shadow-2xl transform -translate-x-full z-50 overscroll-contain flex flex-col" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-8 pb-3 border-b border-slate-700">
                <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Модули АРМ</h2>
                <button onclick="toggleMobileMenu()" class="p-1.5 bg-slate-700 rounded-lg text-slate-300 hover:text-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <nav id="mobileMenuContainer" class="space-y-1.5 flex-grow overflow-y-auto pr-2"></nav>
            <div class="pt-4 border-t border-slate-700/50 mt-auto text-center text-xs text-slate-600">v1.2 (Direct Supabase)</div>
        </aside>
    </div>

    <div class="max-w-7xl mx-auto p-4 md:pt-6 grid grid-cols-1 md:grid-cols-4 md:gap-8">
        <aside class="hidden md:block md:col-span-1 space-y-2 pb-6">
            <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider px-3 mb-3">Доступные модули</h2>
            <nav id="pcMenuContainer" class="space-y-1.5 sticky top-24"></nav>
        </aside>

        <main id="moduleWorkspace" class="md:col-span-3 pb-8">
            </main>
    </div>

    <div id="moduleTemplates" class="hidden">
        <div id="tpl-auth">
            <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 text-center max-w-sm mx-auto mt-10 shadow-lg">
                <h2 id="authTitle" class="text-xl font-bold text-white mb-6">Авторизация сотрудника</h2>
                
                <div id="authUserInfo" class="hidden space-y-4">
                    <p class="text-slate-300 text-sm">Вы вошли как: <br><span id="userEmailLabel" class="font-semibold text-blue-400"></span></p>
                    <button onclick="handleLogout()" class="w-full bg-red-600 hover:bg-red-500 text-white font-semibold py-2.5 rounded-xl transition">
                        🚪 Выйти из профиля
                    </button>
                </div>

                <form id="authForm" onsubmit="handleLogin(event)" class="space-y-4">
                    <div>
                        <label class="block text-left text-xs font-medium text-slate-400 uppercase tracking-wider mb-1.5">Email / Логин</label>
                        <input type="email" id="authEmail" required placeholder="name@minsktrans.by" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 transition">
                    </div>
                    <div>
                        <label class="block text-left text-xs font-medium text-slate-400 uppercase tracking-wider mb-1.5">Пароль</label>
                        <input type="password" id="authPassword" required placeholder="••••••••" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 transition">
                    </div>
                    <button type="submit" id="authBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-xl transition mt-2 shadow-md">
                        Войти
                    </button>
                </form>
            </div>
        </div>
        <div id="tpl-fleet">
            <div class="space-y-8">
                <section class="bg-slate-800 border border-slate-700 rounded-2xl p-5 shadow-lg">
                    <h2 class="text-base font-semibold mb-5 text-white flex items-center gap-2.5 border-b border-slate-700 pb-3">
                        <span class="text-xl">📝</span> Регистрация транспорта
                    </h2>
                    <form id="vehicleForm" onsubmit="saveVehicle(event)" class="grid grid-cols-1 xs:grid-cols-2 gap-x-5 gap-y-4">
                        <div class="xs:col-span-2">
                            <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-1.5">Название / Модель</label>
                            <input type="text" id="model" required placeholder="например, Кировец К-7М" class="w-full bg-slate-900/70 border border-slate-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 transition">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-1.5">Гос. номер</label>
                            <input type="text" id="plate" required placeholder="1234 АБ-7" class="w-full bg-slate-900/70 border border-slate-700 rounded-xl px-4 py-2.5 text-white font-mono focus:outline-none focus:border-blue-500 transition">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-1.5">Окончание Страховки</label>
                            <input type="date" id="insurance" required class="w-full bg-slate-900/70 border border-slate-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 transition">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-1.5">Окончание Техосмотра</label>
                            <input type="date" id="inspection" required class="w-full bg-slate-900/70 border border-slate-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 transition">
                        </div>
                        <div class="xs:col-span-2 pt-2">
                            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-xl transition shadow-lg shadow-blue-600/20 active:scale-[0.98]">
                                💾 Сохранить транспорт в базу
                            </button>
                        </div>
                    </form>
                </section>

                <section class="space-y-5">
                    <h2 class="text-base font-semibold text-white flex items-center gap-2 border-b border-slate-700 pb-3">
                        <span class="text-xl">📋</span> Список автопарка (<span id="count">0</span>)
                    </h2>
                    <div id="vehiclesList" class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                        <div class="col-span-full text-center text-slate-500 py-12">Загрузка данных...</div>
                    </div>
                </section>
            </div>
        </div>

        <div id="tpl-dashboard">
            <div class="bg-slate-800 border border-slate-700 rounded-2xl p-10 text-center max-w-xl mx-auto mt-6 shadow-lg">
                <span class="text-5xl">👋</span>
                <h2 class="text-2xl font-bold text-white mt-6 mb-3">АРМ «Великополье»</h2>
                <p class="text-slate-400 text-sm leading-relaxed">Прямое подключение к облаку Supabase активно.</p>
                <button onclick="toggleMobileMenu()" class="md:hidden mt-8 bg-slate-700 hover:bg-slate-600 text-white font-medium px-6 py-2.5 rounded-xl transition">
                    Открыть меню
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js').then(reg => {
                    setInterval(() => { reg.update(); }, 1000 * 60 * 10);
                    reg.onupdatefound = () => {
                        const worker = reg.installing;
                        worker.onstatechange = () => {
                            if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                                window.location.reload();
                            }
                        };
                    };
                });
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АРМ «Великополье»</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="manifest" href="manifest.json">
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col md:flex-row">

    <header class="md:hidden bg-white border-b border-gray-200 p-4 flex justify-between items-center sticky top-0 z-30 shadow-sm">
        <div class="flex items-center gap-2">
            <span class="text-xl">🚜</span>
            <div>
                <h1 class="text-sm font-bold text-gray-800 leading-tight">СХК «Великополье»</h1>
                <p class="text-[10px] text-gray-400 font-medium">ГП «Минсктранс»</p>
            </div>
        </div>
        <button onclick="toggleMobileMenu()" class="text-gray-600 text-2xl">☰</button>
    </header>

    <aside id="sidebar" class="fixed md:sticky top-0 left-0 z-40 w-64 h-screen bg-white border-r border-gray-200 flex flex-col justify-between p-4 transition-transform -translate-x-full md:translate-x-0 shadow-xl md:shadow-none">
        <div>
            <div class="hidden md:flex items-center gap-2 mb-8 px-2">
                <span class="text-2xl">🚜</span>
                <h1 class="text-xl font-bold text-gray-800">СХК "Великополье"</h1>
            </div>
            <nav id="menuContainer" class="space-y-1"></nav>
        </div>

        <div class="space-y-3 border-t border-gray-100 pt-4">
            <button id="pwaInstallBtn" onclick="installPWA()" class="hidden w-full bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs font-semibold px-3 py-2.5 rounded-xl transition text-center">
                📱 Устаноgвить на телефон
            </button>
            <div class="text-xs text-gray-400 text-center">АРМ v1.0 • Модульный • @Vol4ek</div>
        </div>
    </aside>

    <div id="menuOverlay" onclick="toggleMobileMenu()" class="fixed inset-0 bg-black/40 z-30 hidden md:hidden"></div>

    <main id="moduleWorkspace" class="flex-1 p-4 md:p-8 max-w-7xl mx-auto w-full"></main>

    <script type="module">
        const SUPABASE_URL = "https://eaiitxfoqlkmykyqqapg.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_3sU4_opgqfZ5tPzk1bW5Ig_6XlX97pm"; 
        window._supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const APP_MODULES = [
            { id: 'dashboard', name: '🏠 Главная', file: './js/dashboard.js' },
            { id: 'fleet', name: '🚜 Автопарк', file: './js/fleet.js' }
        ];

        let currentModuleId = 'dashboard';

        window.switchModule = async (moduleId) => {
            currentModuleId = moduleId;
            renderMenu();

            const workspace = document.getElementById('moduleWorkspace');
            workspace.innerHTML = '<div class="text-center text-gray-400 py-12">Загрузка модуля...</div>';

            const targetModule = APP_MODULES.find(m => m.id === moduleId);
            if (targetModule) {
                try {
                    // ?v=Date.now() + Service Worker гарантируют 100% свежий код модулей
                    const module = await import(`${targetModule.file}?v=${Date.now()}`);
                    workspace.innerHTML = module.template;
                    if (module.init) module.init();
                } catch (err) {
                    workspace.innerHTML = `<div class="text-red-500 p-4 bg-red-50 border rounded-xl">Ошибка загрузки файла модуля: ${err.message}</div>`;
                }
            }
        };

        function renderMenu() {
            const container = document.getElementById('menuContainer');
            if (!container) return;
            container.innerHTML = APP_MODULES.map(mod => {
                const isActive = mod.id === currentModuleId;
                const activeClasses = isActive ? 'bg-emerald-50 text-emerald-700 font-semibold shadow-sm' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900';
                return `<button onclick="switchModule('${mod.id}'); if(window.innerWidth < 768) toggleMobileMenu();" class="w-full text-left px-4 py-3 rounded-xl text-sm font-medium transition flex items-center justify-between ${activeClasses}"><span>${mod.name}</span>${isActive ? '<span class="w-1.5 h-1.5 bg-emerald-600 rounded-full"></span>' : ''}</button>`;
            }).join('');
        }

        window.toggleMobileMenu = () => {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('menuOverlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        };

        // --- РЕГИСТРАЦИЯ SERVICE WORKER И КОНТРОЛЬ КЭША ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => {
                        console.log('✅ Service Worker успешно запущен');
                        
                        // Проверяем обновления на сервере при каждом запуске
                        reg.update();

                        // Если найден новый sw.js, сообщаем пользователю и перезагружаем кэш
                        reg.onupdatefound = () => {
                            const installingWorker = reg.installing;
                            installingWorker.onstatechange = () => {
                                if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    console.log('🔄 Вышло обновление системы! Перезагрузка...');
                                    setTimeout(() => { window.location.reload(); }, 1000);
                                }
                            };
                        };
                    })
                    .catch(err => console.error('❌ Ошибка SW:', err));
            });
        }

        // --- ЛОГИКА PWA УСТАНОВКИ НА ТЕЛЕФОН / ПК ---
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); 
            deferredPrompt = e;
            const btn = document.getElementById('pwaInstallBtn');
            if (btn) btn.classList.remove('hidden'); // Показываем кнопку установки в меню
        });

        window.installPWA = async () => {
            if (!deferredPrompt) return; 
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                document.getElementById('pwaInstallBtn').classList.add('hidden');
            }
            deferredPrompt = null;
        };

        document.addEventListener('DOMContentLoaded', () => switchModule('dashboard'));
    </script>
</body>
</html>

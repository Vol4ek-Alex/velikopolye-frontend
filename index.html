<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АРМ «Великополье»</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="manifest" href="manifest.json">
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col md:flex-row">

    <div id="siteAuthOverlay" class="fixed inset-0 bg-gray-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-900 border border-gray-100 dark:border-gray-800 p-6 rounded-2xl w-full max-w-sm shadow-2xl text-center space-y-5">
            <div class="w-16 h-16 bg-emerald-50 dark:bg-emerald-950/30 text-emerald-600 dark:text-emerald-400 rounded-2xl border border-emerald-100 dark:border-emerald-900/50 shadow-sm flex items-center justify-center text-3xl mx-auto">
               🔒
            </div>
            <div>
                <p class="text-xs font-bold text-emerald-600 uppercase tracking-wider mb-1">ф-л СХК «Великополье»</p>
                <h2 class="text-xl font-black text-gray-800 dark:text-white">Вход в систему АРМ</h2>
                <p class="text-xs text-gray-400 dark:text-gray-500 mt-1">Для доступа к панели управления введите ПИН-код</p>
            </div>
        
            <div class="space-y-3">
                <input type="password" id="sitePinInput" inputmode="numeric" pattern="[0-9]*" class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-xl p-3.5 text-center font-mono text-xl tracking-widest text-gray-900 dark:text-white focus:outline-none focus:border-emerald-500 transition" placeholder="••••">
                <button onclick="window.checkSiteAccess()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3.5 rounded-xl font-bold transition shadow-md">
                    Войти
                </button>
            </div>
            <p id="authErrorMsg" class="text-xs font-semibold text-red-600 hidden">❌ Неверный ПИН-код! Доступ ограничен.</p>
        </div>
    </div>

    <header class="md:hidden bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 p-4 flex justify-between items-center sticky top-0 z-30 shadow-sm">
        <div class="flex items-center gap-2">
            <span class="text-xl">🚜</span>
            <div>
                <h1 class="text-sm font-bold text-gray-800 dark:text-white leading-tight">СХК «Великополье»</h1>
                <p class="text-[10px] text-gray-400 dark:text-gray-500 font-medium">ГП «Минсктранс»</p>
            </div>
        </div>
        <button onclick="window.toggleMobileMenu()" class="text-gray-600 dark:text-gray-400 text-2xl">☰</button>
    </header>

    <aside id="sidebar" class="fixed md:sticky top-0 left-0 z-40 w-64 h-screen bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 flex flex-col justify-between p-4 transition-transform -translate-x-full md:translate-x-0 shadow-xl md:shadow-none">
        <div>
            <div class="hidden md:flex items-center gap-3 mb-4 px-2 border-b border-gray-100 dark:border-gray-800 pb-5">
                <span class="text-3xl bg-emerald-50 dark:bg-emerald-950/30 p-2.5 rounded-xl border border-emerald-100 dark:border-emerald-900/50 shadow-sm flex items-center justify-center">🚜</span>
                <div class="flex flex-col justify-center">
                    <span class="text-[10px] font-bold text-emerald-600 uppercase tracking-wider leading-none mb-1 block">ф-л СХК</span>
                    <h1 class="text-lg font-black text-gray-800 dark:text-white leading-tight tracking-tight">«Великополье»</h1>
                    <span class="text-[11px] font-medium text-gray-400 dark:text-gray-500 leading-none mt-1 block">ГП «Минсктранс»</span>
                </div>
            </div>

            <div class="mb-4 flex items-center justify-between bg-gray-100 dark:bg-gray-800/50 p-2 rounded-xl border border-gray-200 dark:border-gray-700">
                <span class="text-xs font-bold text-gray-600 dark:text-gray-400 pl-1">Режим экрана</span>
                <button onclick="window.toggleDarkMode()" id="themeBtn" class="w-8 h-8 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-yellow-400 transition shadow-xs text-sm flex items-center justify-center border border-gray-300/70 dark:border-gray-600">
                    🌙
                </button>
            </div>

            <nav id="menuContainer" class="space-y-1"></nav>
        </div>

        <div class="space-y-3 border-t border-gray-100 dark:border-gray-800 pt-4">
            <button id="pwaInstallBtn" onclick="window.installPWA()" class="hidden w-full bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300 text-xs font-semibold px-3 py-2.5 rounded-xl transition text-center">
                📱 Установить на телефон
            </button>
            <div class="text-xs text-gray-400 dark:text-gray-500 text-center">АРМ v1.0 • Модульный • @Vol4ek</div>
        </div>
    </aside>

    <div id="menuOverlay" onclick="window.toggleMobileMenu()" class="fixed inset-0 bg-black/40 z-30 hidden md:hidden"></div>

    <main id="moduleWorkspace" class="flex-1 p-4 md:p-8 max-w-7xl mx-auto w-full"></main>

    <script type="module">
        const SUPABASE_URL = "https://eaiitxfoqlkmykyqqapg.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_3sU4_opgqfZ5tPzk1bW5Ig_6XlX97pm"; 
        window._supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const APP_MODULES = [
            { id: 'dashboard', name: '🏠 Главная', file: './js/dashboard.js' },
            { id: 'fleet', name: '🚜 Автопарк', file: './js/fleet.js' }
        ];

        let currentModuleId = 'dashboard';

        // ГЕНЕРАЦИЯ МЕНЮ С ТЕМНОЙ ТЕМОЙ ДЛЯ КНОПОК
        function renderMenu() {
            const container = document.getElementById('menuContainer');
            if (!container) return;
            container.innerHTML = APP_MODULES.map(mod => {
                const isActive = mod.id === currentModuleId;
                
                // Классы стилей, адаптированные под темную тему при нажатии
                const activeClasses = isActive 
                    ? 'bg-emerald-50 dark:bg-emerald-950/50 text-emerald-700 dark:text-emerald-400 font-semibold shadow-sm' 
                    : 'text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800/30 hover:text-gray-900 dark:hover:text-gray-100';
                
                return `<button onclick="window.switchModule('${mod.id}'); if(window.innerWidth < 768) window.toggleMobileMenu();" class="w-full text-left px-4 py-3 rounded-xl text-sm font-medium transition flex items-center justify-between ${activeClasses}"><span>${mod.name}</span>${isActive ? '<span class="w-1.5 h-1.5 bg-emerald-600 rounded-full"></span>' : ''}</button>`;
            }).join('');
        }

        // НАВИГАЦИЯ ПО МОДУЛЯМ
        window.switchModule = async (moduleId) => {
            currentModuleId = moduleId;
            renderMenu();

            const workspace = document.getElementById('moduleWorkspace');
            workspace.innerHTML = '<div class="text-center text-gray-400 py-12">Загрузка модуля...</div>';

            const targetModule = APP_MODULES.find(m => m.id === moduleId);
            if (targetModule) {
                try {
                    const module = await import(`${targetModule.file}?v=${Date.now()}`);
                    workspace.innerHTML = module.template;
                    if (module.init) module.init();
                } catch (err) {
                    workspace.innerHTML = `<div class="text-red-500 p-4 bg-red-50 border rounded-xl">Ошибка загрузки файла модуля: ${err.message}</div>`;
                }
            }
        };

        // УПРАВЛЕНИЕ МОБИЛЬНЫМ МЕНЮ
        window.toggleMobileMenu = () => {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('menuOverlay');
            if (sidebar && overlay) {
                sidebar.classList.toggle('-translate-x-full');
                overlay.classList.toggle('hidden');
            }
        };

        // УПРАВЛЕНИЕ ТЕМНОЙ ТЕМОЙ
        window.toggleDarkMode = function() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            
            const btn = document.getElementById('themeBtn');
            if (btn) btn.innerText = isDark ? '☀️' : '🌙';
        };

        // Проверка темы при загрузке
        (function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const isDark = savedTheme === 'dark' || (!savedTheme && prefersDark);
            
            if (isDark) {
                document.documentElement.classList.add('dark');
                document.addEventListener("DOMContentLoaded", () => {
                    const btn = document.getElementById('themeBtn');
                    if (btn) btn.innerText = '☀️';
                });
            }
        })();

        // СЕРВИС-ВОРКЕР
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => {
                        reg.update();
                        reg.onupdatefound = () => {
                            const installingWorker = reg.installing;
                            installingWorker.onstatechange = () => {
                                if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    setTimeout(() => { window.location.reload(); }, 1000);
                                }
                            };
                        };
                    })
                    .catch(err => console.error('Ошибка SW:', err));
            });
        }

        // КНОПКА PWA
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); 
            deferredPrompt = e;
            const btn = document.getElementById('pwaInstallBtn');
            if (btn) btn.classList.remove('hidden'); 
        });

        window.installPWA = async () => {
            if (!deferredPrompt) return; 
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                document.getElementById('pwaInstallBtn').classList.add('hidden');
            }
            deferredPrompt = null;
        };

        // ПИН-КОД (ЗАЩИТА)
        const SITE_PIN = "7777"; 

        window.checkSiteAccess = () => {
            const input = document.getElementById('sitePinInput');
            const error = document.getElementById('authErrorMsg');
            
            if (input && input.value === SITE_PIN) {
                localStorage.setItem('site_access_granted', 'true');
                document.getElementById('siteAuthOverlay').classList.add('hidden');
            } else {
                if (error) error.classList.remove('hidden');
                if (input) { input.value = ''; input.focus(); }
            }
        };

        function verifySession() {
            const overlay = document.getElementById('siteAuthOverlay');
            if (localStorage.getItem('site_access_granted') === 'true') {
                if (overlay) overlay.classList.add('hidden');
            } else {
                if (overlay) overlay.classList.remove('hidden');
            }
        }

        // ЗАПУСК И ПЕРВИЧНАЯ ОТРИСОВКА
        verifySession();
        renderMenu(); // Восстановлено: рендерим кнопки меню при загрузке страницы
        window.switchModule('dashboard');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>АРМ «Великополье»</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <style>
        #mobileMenuOverlay { transition: opacity 0.3s; }
        #mobileDrawer { transition: transform 0.3s ease-out; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased overscroll-none">

    <header class="bg-slate-800 border-b border-slate-700 sticky top-0 z-40 shadow-md viewport-fit">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center h-16">
            <div class="flex items-center gap-3">
                <button onclick="toggleMobileMenu()" class="md:hidden p-1.5 bg-slate-700 rounded-lg hover:bg-slate-600 transition">
                    <svg class="w-6 h-6 text-slate-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </button>
                <h1 class="font-bold tracking-tight text-white flex items-center gap-2">
                    <span class="text-xl">🚜</span>
                    <span class="hidden xs:inline text-lg">СХК «Великополье»</span>
                    <span class="inline xs:hidden text-lg">СХК</span>
                </h1>
            </div>

            <button onclick="refreshCurrentModule()" class="bg-blue-600 hover:bg-blue-500 text-white p-2 md:px-4 md:py-2 rounded-xl flex items-center gap-2 transition shadow-md shadow-blue-600/20">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                <span class="hidden md:inline text-sm font-medium">Обновить данные</span>
            </button>
        </div>
    </header>

    <div id="mobileMenuOverlay" class="fixed inset-0 bg-slate-950/80 z-50 opacity-0 pointer-events-none hidden" onclick="toggleMobileMenu()">
        <aside id="mobileDrawer" class="fixed top-0 left-0 bottom-0 w-[280px] bg-slate-800 p-5 shadow-2xl transform -translate-x-full z-50 overscroll-contain flex flex-col" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-8 pb-3 border-b border-slate-700">
                <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Модули АРМ</h2>
                <button onclick="toggleMobileMenu()" class="p-1.5 bg-slate-700 rounded-lg text-slate-300 hover:text-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <nav id="mobileMenuContainer" class="space-y-1.5 flex-grow overflow-y-auto pr-2"></nav>
            <div class="pt-4 border-t border-slate-700/50 mt-auto text-center text-xs text-slate-600">v1.2 (Direct Supabase)</div>
        </aside>
    </div>

    <div class="max-w-7xl mx-auto p-4 md:pt-6 grid grid-cols-1 md:grid-cols-4 md:gap-8">
        <aside class="hidden md:block md:col-span-1 space-y-2 pb-6">
            <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider px-3 mb-3">Доступные модули</h2>
            <nav id="pcMenuContainer" class="space-y-1.5 sticky top-24"></nav>
        </aside>

        <main id="moduleWorkspace" class="md:col-span-3 pb-8">
            </main>
    </div>

    <div id="moduleTemplates" class="hidden">
        <div id="tpl-auth">
            <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 text-center max-w-sm mx-auto mt-10 shadow-lg">
                <h2 id="authTitle" class="text-xl font-bold text-white mb-6">Авторизация сотрудника</h2>
                
                <div id="authUserInfo" class="hidden space-y-4">
                    <p class="text-slate-300 text-sm">Вы вошли как: <br><span id="userEmailLabel" class="font-semibold text-blue-400"></span></p>
                    <button onclick="handleLogout()" class="w-full bg-red-600 hover:bg-red-500 text-white font-semibold py-2.5 rounded-xl transition">
                        🚪 Выйти из профиля
                    </button>
                </div>

                <form id="authForm" onsubmit="handleLogin(event)" class="space-y-4">
                    <div>
                        <label class="block text-left text-xs font-medium text-slate-400 uppercase tracking-wider mb-1.5">Email / Логин</label>
                        <input type="email" id="authEmail" required placeholder="name@minsktrans.by" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 transition">
                    </div>
                    <div>
                        <label class="block text-left text-xs font-medium text-slate-400 uppercase tracking-wider mb-1.5">Пароль</label>
                        <input type="password" id="authPassword" required placeholder="••••••••" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 transition">
                    </div>
                    <button type="submit" id="authBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-xl transition mt-2 shadow-md">
                        Войти
                    </button>
                </form>
            </div>
        </div>
        <div id="tpl-fleet">
            <div class="space-y-8">
                <section class="bg-slate-800 border border-slate-700 rounded-2xl p-5 shadow-lg">
                    <h2 class="text-base font-semibold mb-5 text-white flex items-center gap-2.5 border-b border-slate-700 pb-3">
                        <span class="text-xl">📝</span> Регистрация транспорта
                    </h2>
                    <form id="vehicleForm" onsubmit="saveVehicle(event)" class="grid grid-cols-1 xs:grid-cols-2 gap-x-5 gap-y-4">
                        <div class="xs:col-span-2">
                            <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-1.5">Название / Модель</label>
                            <input type="text" id="model" required placeholder="например, Кировец К-7М" class="w-full bg-slate-900/70 border border-slate-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 transition">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-1.5">Гос. номер</label>
                            <input type="text" id="plate" required placeholder="1234 АБ-7" class="w-full bg-slate-900/70 border border-slate-700 rounded-xl px-4 py-2.5 text-white font-mono focus:outline-none focus:border-blue-500 transition">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-1.5">Окончание Страховки</label>
                            <input type="date" id="insurance" required class="w-full bg-slate-900/70 border border-slate-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 transition">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-1.5">Окончание Техосмотра</label>
                            <input type="date" id="inspection" required class="w-full bg-slate-900/70 border border-slate-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 transition">
                        </div>
                        <div class="xs:col-span-2 pt-2">
                            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-xl transition shadow-lg shadow-blue-600/20 active:scale-[0.98]">
                                💾 Сохранить транспорт в базу
                            </button>
                        </div>
                    </form>
                </section>

                <section class="space-y-5">
                    <h2 class="text-base font-semibold text-white flex items-center gap-2 border-b border-slate-700 pb-3">
                        <span class="text-xl">📋</span> Список автопарка (<span id="count">0</span>)
                    </h2>
                    <div id="vehiclesList" class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                        <div class="col-span-full text-center text-slate-500 py-12">Загрузка данных...</div>
                    </div>
                </section>
            </div>
        </div>

        <div id="tpl-dashboard">
            <div class="bg-slate-800 border border-slate-700 rounded-2xl p-10 text-center max-w-xl mx-auto mt-6 shadow-lg">
                <span class="text-5xl">👋</span>
                <h2 class="text-2xl font-bold text-white mt-6 mb-3">АРМ «Великополье»</h2>
                <p class="text-slate-400 text-sm leading-relaxed">Прямое подключение к облаку Supabase активно.</p>
                <button onclick="toggleMobileMenu()" class="md:hidden mt-8 bg-slate-700 hover:bg-slate-600 text-white font-medium px-6 py-2.5 rounded-xl transition">
                    Открыть меню
                </button>
            </div>
        </div>
    </div>

    <script>
        // ИНИЦИАЛИЗАЦИЯ SUPABASE НАПРЯМУЮ ВО ФРОНТЕНДЕ
        // Замени эти значения на свои из Supabase (как на скриншотах):
        const SUPABASE_URL = "https://eaiitxfoqlkmykyqqapg.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_3sU4_opgqfZ5tPzk1bW5Ig_6XlX97pm"; 

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const APP_MODULES = [
            { id: 'dashboard', name: '🏠 Главная панель', init: () => {} },
            { id: 'fleet', name: '🚜 Сельхоз.парк', init: loadVehicles },
            { id: 'auth', name: '🔐 Вход в АРМ', init: initAuthScreen }
        ];
        let currentModuleId = 'dashboard';

        function toggleMobileMenu() {
            const overlay = document.getElementById('mobileMenuOverlay');
            const drawer = document.getElementById('mobileDrawer');
            if (overlay.classList.contains('hidden')) {
                overlay.classList.remove('hidden');
                setTimeout(() => {
                    overlay.classList.remove('opacity-0');
                    overlay.classList.add('pointer-events-auto');
                    drawer.classList.remove('-translate-x-full');
                }, 10);
            } else {
                overlay.classList.add('opacity-0');
                overlay.classList.remove('pointer-events-auto');
                drawer.classList.add('-translate-x-full');
                setTimeout(() => { overlay.classList.add('hidden'); }, 300);
            }
        }

        function renderMenu() {
            const pcContainer = document.getElementById('pcMenuContainer');
            const mobileContainer = document.getElementById('mobileMenuContainer');
            const menuHtml = APP_MODULES.map(mod => {
                const isActive = mod.id === currentModuleId;
                const activeClasses = isActive ? 'bg-blue-600 text-white font-semibold shadow-md' : 'text-slate-400 hover:bg-slate-800/60 hover:text-slate-200';
                return `
                    <button onclick="switchModule('${mod.id}'); if(window.innerWidth < 768) toggleMobileMenu();" class="w-full text-left px-5 py-3.5 rounded-xl text-sm transition flex items-center justify-between ${activeClasses}">
                        <span>${mod.name}</span>
                        ${isActive ? '<span class="w-2 h-2 bg-white rounded-full"></span>' : ''}
                    </button>
                `;
            }).join('');
            if(pcContainer) pcContainer.innerHTML = menuHtml;
            if(mobileContainer) mobileContainer.innerHTML = menuHtml;
        }

        function switchModule(moduleId) {
            currentModuleId = moduleId;
            renderMenu();
            document.getElementById('moduleWorkspace').innerHTML = document.getElementById(`tpl-${moduleId}`).innerHTML;
            const targetModule = APP_MODULES.find(m => m.id === moduleId);
            if (targetModule && targetModule.init) targetModule.init();
            window.scrollTo(0, 0);
        }

        function refreshCurrentModule() {
            const targetModule = APP_MODULES.find(m => m.id === currentModuleId);
            if (targetModule && targetModule.init) targetModule.init();
        }

        // Проверка текущего вошедшего пользователя
        async function checkUser() {
            const { data: { user } } = await _supabase.auth.getUser();
            return user;
        }

        // Экран входа
        async function initAuthScreen() {
            const user = await checkUser();
            const form = document.getElementById('authForm');
            const info = document.getElementById('authUserInfo');
            const title = document.getElementById('authTitle');

            if (user) {
                form.classList.add('hidden');
                info.classList.remove('hidden');
                document.getElementById('userEmailLabel').innerText = user.email;
                title.innerText = "Личный кабинет";
            } else {
                form.classList.remove('hidden');
                info.classList.add('hidden');
                title.innerText = "Авторизация сотрудника";
            }
        }

        // Хендлер авторизации
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('authBtn');
            btn.innerText = 'Вход...';
            btn.disabled = true;

            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;

            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

            if (error) {
                alert('Ошибка авторизации: ' + error.message);
                btn.innerText = 'Войти';
                btn.disabled = false;
            } else {
                alert('Успешный вход в систему!');
                switchModule('fleet'); // Перекидываем в автопарк
            }
        }

        // Хендлер выхода
        async function handleLogout() {
            await _supabase.auth.signOut();
            alert('Вы вышли из системы');
            switchModule('dashboard');
        }
        // --- ЛОГИКА РАБОТЫ С БАЗОЙ ДАННЫХ SUPABASE + КОНТРОЛЬ СРОКОВ ---
        async function loadVehicles() {
            const listContainer = document.getElementById('vehiclesList');
            if (!listContainer) return;

            // ПРОВЕРКА ПРАВ
            const user = await checkUser();
            const formSection = document.querySelector('#moduleWorkspace form')?.closest('section');
            
            if (formSection) {
                if (user) {
                    // Пользователь авторизован — показываем форму добавления
                    formSection.classList.remove('hidden');
                } else {
                    // Гость — скрываем форму, чтобы нельзя было ничего добавить
                    formSection.classList.add('hidden');
                }
            }
            
            // ... (весь остальной твой код загрузки списка машин из Supabase)

            try {
                // Запрос к Supabase
                const { data, error } = await _supabase
                    .from('vehicles')
                    .select('*');

                if (error) throw error;

                if(data.length === 0) {
                    document.getElementById('count').innerText = '0';
                    listContainer.innerHTML = `<div class="col-span-full text-center text-slate-600 py-12 px-6 border-2 border-dashed border-slate-700 rounded-xl">В базе парка пока нет техники.</div>`;
                    return;
                }

                const today = new Date();
                today.setHours(0,0,0,0); // сбрасываем время для точного расчета дней

                // Массивы для аналитики
                let expiredCount = 0;
                let warningCount = 0;

                // Обрабатываем каждую машину и вычисляем остаток дней
                const processedVehicles = data.map(v => {
                    const insDate = new Date(v.insurance);
                    const inspDate = new Date(v.inspection);
                    insDate.setHours(0,0,0,0);
                    inspDate.setHours(0,0,0,0);

                    // Расчет дней (1 день = 24 * 60 * 60 * 1000 мс)
                    const daysLeftIns = Math.ceil((insDate - today) / (1000 * 60 * 60 * 24));
                    const daysLeftInsp = Math.ceil((inspDate - today) / (1000 * 60 * 60 * 24));

                    // Определяем статус для сортировки (чем меньше дней, тем выше приоритет)
                    const minDays = Math.min(daysLeftIns, daysLeftInsp);

                    if (daysLeftIns <= 0 || daysLeftInsp <= 0) {
                        expiredCount++;
                    } else if (daysLeftIns <= 30 || daysLeftInsp <= 30) {
                        warningCount++;
                    }

                    return { ...v, daysLeftIns, daysLeftInsp, minDays };
                });

                // Сортируем: сначала самые проблемные (где меньше всего дней или уже просрочено)
                processedVehicles.sort((a, b) => a.minDays - b.minDays);

                // Обновляем общую цифру на странице
                document.getElementById('count').innerText = processedVehicles.length;

                // Генерация карточек
                listContainer.innerHTML = processedVehicles.map(v => {
                    const insDateStr = new Date(v.insurance).toLocaleDateString('ru-RU');
                    const inspDateStr = new Date(v.inspection).toLocaleDateString('ru-RU');

                    // Функция для подбора стиля текста и фонов в зависимости от дней
                    const getStatusStyle = (days) => {
                        if (days <= 0) {
                            return {
                                text: 'text-red-500 font-bold',
                                bg: 'bg-red-500/10 border-red-500/30',
                                label: `Просрочено на ${Math.abs(days)} дн.`
                            };
                        } else if (days <= 30) {
                            return {
                                text: 'text-amber-400 font-medium',
                                bg: 'bg-amber-500/10 border-amber-500/30',
                                label: `Осталось: ${days} дн.`
                            };
                        } else {
                            return {
                                text: 'text-emerald-400',
                                bg: 'bg-slate-900/50 border-slate-700/50',
                                label: `Осталось: ${days} дн.`
                            };
                        }
                    };

                    const insStyle = getStatusStyle(v.daysLeftIns);
                    const inspStyle = getStatusStyle(v.daysLeftInsp);

                    // Общая рамка карточки: если хоть один документ просрочен — подсветим всю карточку
                    const cardBorderColor = (v.daysLeftIns <= 0 || v.daysLeftInsp <= 0) 
                        ? 'border-red-500/40 hover:border-red-500/60 shadow-red-950/20' 
                        : (v.daysLeftIns <= 30 || v.daysLeftInsp <= 30)
                        ? 'border-amber-500/40 hover:border-amber-500/60 shadow-amber-950/20'
                        : 'border-slate-700 hover:border-slate-600';

                    return `
                        <div class="bg-slate-800 border ${cardBorderColor} rounded-2xl p-5 shadow-lg flex flex-col justify-between transition hover:shadow-xl">
                            <div>
                                <div class="flex justify-between items-start mb-4 gap-3">
                                    <h3 class="font-bold text-white text-base leading-tight">${v.model}</h3>
                                    <span class="bg-slate-900 border border-slate-600 text-xs text-slate-200 font-mono px-2 py-1 rounded-md shadow-inner">${v.plate}</span>
                                </div>
                                
                                <div class="space-y-3 pt-3 border-t border-slate-700/60 text-xs">
                                    <div class="p-2.5 rounded-xl border ${insStyle.bg} flex justify-between items-center">
                                        <div>
                                            <span class="text-slate-400 block text-[11px] uppercase tracking-wider">Страховка</span>
                                            <span class="text-slate-200 font-medium">${insDateStr}</span>
                                        </div>
                                        <span class="${insStyle.text}">${insStyle.label}</span>
                                    </div>

                                    <div class="p-2.5 rounded-xl border ${inspStyle.bg} flex justify-between items-center">
                                        <div>
                                            <span class="text-slate-400 block text-[11px] uppercase tracking-wider">Техосмотр</span>
                                            <span class="text-slate-200 font-medium">${inspDateStr}</span>
                                        </div>
                                        <span class="${inspStyle.text}">${inspStyle.label}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                // Если хочешь выводить инфо-панель сверху (просрочено/внимания), 
                // мы можем также динамически внедрить блоки-счетчики. Пока выведем логи в консоль:
                console.log(`Просрочено: ${expiredCount}, Внимания требует: ${warningCount}`);

            } catch (error) {
                console.error(error);
                listContainer.innerHTML = `<div class="col-span-full text-center text-red-400 py-12 px-6 border border-red-500/30 bg-red-950/20 rounded-xl">⚠️ Ошибка получения данных: <br> ${error.message}</div>`;
            }
        }

        async function saveVehicle(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = 'Сохранение...';
            btn.disabled = true;

            const row = {
                model: document.getElementById('model').value,
                plate: document.getElementById('plate').value,
                insurance: document.getElementById('insurance').value,
                inspection: document.getElementById('inspection').value
            };

            try {
                // Прямая вставка строки в таблицу 'vehicles'
                const { error } = await _supabase
                    .from('vehicles')
                    .insert([row]);

                if (error) throw error;

                document.getElementById('vehicleForm').reset();
                await loadVehicles();
            } catch (error) {
                alert('Ошибка сохранения в Supabase: ' + error.message);
            } finally {
                btn.innerHTML = '💾 Сохранить транспорт в базу';
                btn.disabled = false;
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            switchModule('dashboard');
        });
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js').then(reg => {
                    setInterval(() => { reg.update(); }, 1000 * 60 * 10);
                    reg.onupdatefound = () => {
                        const worker = reg.installing;
                        worker.onstatechange = () => {
                            if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                                window.location.reload();
                            }
                        };
                    };
                });
            });
        }
    </script>
</body>
</html>
